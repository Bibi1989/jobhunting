# Monorepo deploy (only if Netlify is connected to the full ai-job-scraper repo).
# If the site uses the web-only jobhunting repo, use web/netlify.toml instead (no base).
[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "netlify"
  NUXT_PUBLIC_API_BACKEND = "nuxt"
