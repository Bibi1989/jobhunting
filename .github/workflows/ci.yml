name: web

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "db/**"
  pull_request:
    paths:
      - "web/**"
      - "db/**"

defaults:
  run:
    working-directory: web

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NUXT_SESSION_PASSWORD: ci-session-password-at-least-32-chars
          DATABASE_URL: postgresql://scraper:scraper@localhost:5432/job_scraper
          NUXT_PUBLIC_API_BACKEND: nuxt
          MIGRATIONS_DIR: ${{ github.workspace }}/db/migrations
