# This package is the Netlify site root (e.g. Bibi1989/jobhunting = web/).
[build]
  command = "npm run build"
  publish = "dist/"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "netlify"
  NUXT_PUBLIC_API_BACKEND = "nuxt"

# Required in Netlify UI → Environment variables (Production + Deploy previews):
#   DATABASE_URL            Neon pooler URL (sslmode=require; remove channel_binding=require)
#   NUXT_DATABASE_URL       same as DATABASE_URL (Nuxt runtimeConfig override — recommended)
#   NUXT_SESSION_PASSWORD   ≥32 random characters
#   NUXT_PUBLIC_API_BACKEND=nuxt
#   GEMINI_API_KEY          Google AI Studio key (same as local web/.env)
#   GEMINI_MODEL            e.g. gemini-3.1-pro-preview  (must match local for same quality)
#   GEMINI_MODEL_PARSEKIT   e.g. gemini-2.5-flash  (parse, ATS check/analyze, enhance, translate, portfolio analyze, application extract/answer, scrape enrich)
# Optional:
#   NUXT_GEMINI_API_KEY / NUXT_GEMINI_MODEL / NUXT_GEMINI_MODEL_PARSEKIT
#   NUXT_APP_URL=https://<site>.netlify.app
#   OLLAMA_* only for local fallback — leave unset on Netlify
